
# HYPRLOCK CONFIGURATION

general {
    no_fade_in = false
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 1
    brightness = 0.2
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_center = true
    outer_color = rgba(33ccffee)
    inner_color = rgba(00000000)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = Password
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    # font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}
