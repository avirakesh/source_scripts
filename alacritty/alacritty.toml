
[env]

[window]
padding = { x = 5, y = 5 }
dynamic_padding = true
decorations = "None"
opacity = 0.9
blur = true

[font]
normal = { family="CaskaydiaCove Nerd Font Mono" }
size = 11.25

[terminal]
osc52 = "CopyPaste"

[keyboard]
bindings = [
    { key="N", mods="Control | Shift", action="SpawnNewInstance" },
    { key="Return", mods="Shift", chars="\u001B\r" },
]

[general]
import = ["~/.config/alacritty/themes/themes/ayu_dark.toml"]
