
[env]

[window]
padding = { x = 5, y = 5 }
dynamic_padding = true
decorations = "None"
opacity = 0.8
blur = true

[font]
normal = { family="CaskaydiaCove Nerd Font Mono" }
size = 11.25

[terminal]
osc52 = "CopyPaste"

[keyboard]
bindings = [{ key="N", mods="Control | Shift", action="SpawnNewInstance" },]

[general]
import = ["~/.config/alacritty/themes/themes/monokai_charcoal.toml"]
